<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Folio — a study companion</title>
  <meta name="description" content="Folio — an editorial flashcard study companion for history. Fixed decks, spaced repetition, daily challenges." />
  <meta name="theme-color" content="#F6F5F1" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#161619" media="(prefers-color-scheme: dark)" />
  <meta name="color-scheme" content="light dark" />

  <!-- Fonts are imported in styles.css; preconnect speeds the handshake -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Inline SVG favicon: a vermilion seal on warm paper -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23F6F5F1'/%3E%3Ccircle cx='16' cy='16' r='6.5' fill='%23C8453C'/%3E%3C/svg%3E" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ============================================================
       TOP BAR
       Left:  Home · Decks · Map
       Right: Account · Settings
       ============================================================ -->
  <header class="topbar">
    <nav class="nav left" aria-label="Primary">
      <button class="tab" type="button" data-route="home">Home<span class="ink"></span></button>
      <button class="tab" type="button" data-route="decks">Library<span class="ink"></span></button>
      <button class="tab" type="button" data-route="map">Atlas<span class="ink"></span></button>
      <button class="tab" type="button" data-route="mission">Mission<span class="ink"></span></button>
    </nav>

    <nav class="nav right" aria-label="Account">
      <button class="mode-switch" id="mode-switch" type="button" role="switch" aria-checked="true" title="Editor view — click to preview as a first-time visitor">
        <span class="ms-dot" aria-hidden="true"></span>
        <span class="ms-label" id="mode-label">Editor</span>
      </button>
      <button class="tab tab-admin" type="button" data-route="admin">Edit<span class="ink"></span></button>
      <button class="theme-switch" id="theme-switch" type="button" role="switch" aria-checked="false" aria-label="Toggle dark mode" title="Toggle light / dark">
        <svg class="ic ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="ic ic-moon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <span class="ts-knob"></span>
      </button>
      <button class="tab" type="button" data-route="account">Account<span class="ink"></span></button>
      <button class="tab" type="button" data-route="settings">Settings<span class="ink"></span></button>
      <button class="lang-switch" id="lang-switch" type="button" aria-haspopup="listbox" aria-expanded="false" title="Change language" aria-label="Change language">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
        <span class="lang-code" id="lang-code">EN</span>
      </button>
    </nav>
  </header>

  <!-- ============================================================
       PAGE MOUNT
       app.js renders each page into #view as <div class="page">…</div>
       ============================================================ -->
  <main class="stage">
    <div id="view"></div>
  </main>

  <noscript>
    <div style="max-width:560px;margin:80px auto;padding:0 24px;font-family:Georgia,serif;color:#1B1A17;text-align:center;">
      <h1 style="font-weight:600;">Folio needs JavaScript</h1>
      <p style="color:#4A4843;">This study companion runs entirely in your browser. Please enable JavaScript to load your decks.</p>
    </div>
  </noscript>

  <!-- data first (defines window.CARD_DATA + window.DECK_TREE), then the app -->
  <script src="data.js"></script>
  <script src="truefalse.js"></script>
  <script src="quotes.js"></script>
  <script src="changelog.js"></script>
  <script src="mission.js"></script>
  <script src="glossary.js"></script>
	<script src="glossary-wikipedia.js"></script>
  <script src="world.js"></script>
  <script src="uk.js"></script>
  <script src="lakes.js"></script>
  <script src="rivers.js"></script>
  <script src="water.js"></script>
  <script src="ranges.js"></script>
  <script src="admin1.js"></script>
  <script src="cities.js"></script>
  <script src="timeline.js"></script>
  <script src="countries.js"></script>
  <script src="country-stats.js"></script>
  <script src="country-spans.js"></script>
  <script src="country-years.js"></script>
  <script src="app.js"></script>
</body>
</html>
